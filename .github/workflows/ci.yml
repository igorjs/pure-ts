name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Lint & format
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Runtime tests
        run: npm test

      - name: Type tests
        run: npm run test:types
