name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm test

      - name: Type tests
        run: pnpm run test:types

      - name: Smoke test (Node 22)
        run: node tests/runtime-smoke.mjs

  runtime-smoke:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node-24
            node-version: "24"
            command: node tests/runtime-smoke.mjs

          - runtime: deno
            command: deno run --allow-all tests/runtime-smoke.mjs

          - runtime: bun
            command: bun tests/runtime-smoke.mjs

    name: smoke / ${{ matrix.runtime }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version || '22' }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Install Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2

      - name: Install Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Smoke test (${{ matrix.runtime }})
        run: ${{ matrix.command }}
