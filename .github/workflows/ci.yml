name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm test

      - name: Bundle size / tree-shaking
        run: node tests/bundle-size.mjs

      - name: Type tests
        run: pnpm run test:types

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  integration-node:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "23", "24", "25", "26"]
    name: integration / node-${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Unit tests
        run: pnpm test
      - name: Runtime smoke test
        run: node tests/smoke-platform.mjs
      - name: Core smoke test
        run: node tests/smoke-core.mjs

  integration-deno:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deno-version: ["2.x", "canary"]
    name: integration / deno-${{ matrix.deno-version }}
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Runtime smoke test
        run: deno run --allow-all tests/smoke-platform.mjs
      - name: Core smoke test
        run: deno run --allow-all tests/smoke-core.mjs

  integration-bun:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ["latest", "canary"]
    name: integration / bun-${{ matrix.bun-version }}
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Runtime smoke test
        run: bun tests/smoke-platform.mjs
      - name: Core smoke test
        run: bun tests/smoke-core.mjs

  integration-workers:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: integration / cf-workers
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - run: pnpm add -D miniflare
      - name: Workers smoke test (miniflare)
        run: node tests/workers/run.mjs

  integration-browser:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: integration / browser
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - run: pnpm add -D playwright
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('node_modules/.pnpm/playwright@*/node_modules/playwright/package.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Browser smoke test (Chromium)
        run: node tests/browser/run.mjs
