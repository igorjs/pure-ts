name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm test

      - name: Bundle size / tree-shaking
        run: node tests/bundle-size.mjs

      - name: Type tests
        run: pnpm run test:types

  smoke-node-22:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: smoke / node-22
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Runtime smoke test
        run: node tests/runtime-smoke.mjs
      - name: Web smoke test
        run: node tests/web-smoke.mjs

  smoke-node-24:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: smoke / node-24
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Runtime smoke test
        run: node tests/runtime-smoke.mjs
      - name: Web smoke test
        run: node tests/web-smoke.mjs

  smoke-deno:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: smoke / deno
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: denoland/setup-deno@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Runtime smoke test
        run: deno run --allow-all tests/runtime-smoke.mjs
      - name: Web smoke test
        run: deno run --allow-all tests/web-smoke.mjs

  smoke-bun:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: smoke / bun
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Runtime smoke test
        run: bun tests/runtime-smoke.mjs
      - name: Web smoke test
        run: bun tests/web-smoke.mjs

  smoke-workers:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: smoke / cf-workers
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm add -D miniflare
      - name: Workers smoke test (miniflare)
        run: node tests/workers/run.mjs

  smoke-browser:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: smoke / browser
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm add -D playwright
      - run: npx playwright install chromium --with-deps
      - name: Browser smoke test (Chromium via Playwright)
        run: node tests/browser/run.mjs
