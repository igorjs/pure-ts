name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "patch | minor | major | x.y.z. Leave blank to release the version currently in package.json (it must not already be tagged)."
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry-run: preview the release without writing files, creating commits/tags, or publishing."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: node scripts/release.mjs ${{ inputs.version }} --yes --skip-test-ci ${{ inputs.dry_run && "--dry-run" || "" }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
